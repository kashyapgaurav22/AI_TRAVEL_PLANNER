spring.application.name=ai-travel-planner

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/travel_planner}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:REPLACE_WITH_BASE64_SECRET}
jwt.expiration-ms=86400000

llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.model=gemini-2.0-flash
